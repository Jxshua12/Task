<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects</title>
</head>
<body>
    <p>youtube subscribe button</p>

    <button onclick="
        subscribe();
    " class="js-subscribe-button">subscribe</button>

    <p>amazon shipping calculator</p>

    <p>orders under $40= +$10 shipping.</p>

    <p>orders over $40= FREE shipping</p>

    <input placeholder="cost of order" class="js-cost-input" onkeydown="
       enterOnKeydown();
    ">

    <button onclick="
        getTotalCost();
    " class="js-calculate-button">calculate</button>

    <p class="js-display-output"></p>

    <input class="js-input-output" onkeyup="
        enterOnKeyUp();
    " placeholder="Type something">

    <p class="display-element"></p>
</body>
<script>
    function subscribe() {
        const buttonElement = document.querySelector('.js-subscribe-button')

        if (buttonElement.innerText === 'subscribe') {
            buttonElement.innerHTML = 'subscribed!'
        }
        else {
            buttonElement.innerHTML = 'subscribe'
        }
    };

    function enterOnKeydown() {
         if (event.key === 'Enter') {
            getTotalCost();
        };
    }

    function getTotalCost() {
        const inputElement = document.querySelector('.js-cost-input')
        let cost = Number(inputElement.value)

        if (cost < 40) {
            cost = Math.round(cost + 10);
        }
        const emptyElement = document.querySelector('.js-display-output')
            .innerHTML = `$${cost}`;
    };

    function enterOnKeyUp() {
        const inputElement2 = document.querySelector('.js-input-output');
        document.querySelector('.display-element')
            .innerHTML = inputElement2.value;
    };
</script>
</html>
