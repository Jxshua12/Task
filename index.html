<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="
        runHeadsButton();
        " class="head-button">heads</button>

    <button onclick="
        runTailsButton();
    " class="tail-button">tails</button>

    <p class="displayPopUp"></p>

    <input placeholder="Name" class="input-button" onkeydown="
       enterOnKeyDown();
    ">

    <button onclick="
        getSubmitButton();
    " class="submit-button">Submit</button>

    <p class="printPopUp"></p>
</body>
<script>
    function runHeadsButton() {
        const buttonElement = document.querySelector('.head-button')
        const emptyElement = document.querySelector('.displayPopUp')
            .innerHTML = 'You chose: heads.';
    };

    function runTailsButton() {
        const buttonElement = document.querySelector('.tail-button')
        const emptyElement = document.querySelector('.displayPopUp')
            .innerHTML = 'You chose: tails.';
    };

    function getSubmitButton() {
        const inputElement = document.querySelector('.input-button')
        document.querySelector('.printPopUp')
            .innerHTML = `Your name is: ${inputElement.value}`;
    };

    function enterOnKeyDown() {
         if (event.key === 'Enter') {
            const inputElement = document.querySelector('.input-button')
            document.querySelector('.printPopUp')
                .innerHTML = `Your name is: ${inputElement.value}`;
        };
    }
</script>
</html>
